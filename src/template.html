<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
</head>
<body>
    <div class="app">
        <div class="sidebar">
            <h1>Folders</h1>
            <div class="folders">    
            </div>
            <div class="creation-buttons">
                <Button class="folder-button">Create Folder</Button>
                <button class="create-todo">Create Todo</button>
            </div>
        </div>
        <div class="main">
        </div>
    </div>
    <div id="folder-screen">
        <form>
            <div class="question">
                <label for="folder-name">Folder name *</label>
                <input type="text" 
                    id="folder-name" 
                    name="folderName" 
                    placeholder="Eg. Personal" 
                    required>
            </div>
            <button type="button" class="close" id="folder">✖</button>
            <button type="submit">Save</button>
        </form>
    </div>

    <div id="todo-screen">
        <form>
            <div class="question">
                <label for="todo-name">Task *</label>
                <input type="text" 
                    id="todo-name" 
                    name="taskName" 
                    placeholder="Eg. Walk the Dog" 
                    required>

            </div>
            <div class="question">
                <label for="todo-date">Due Date *</label>
                <input type="date" 
                id="todo-date" 
                name="dueDate"
                required>
            </div>
            <div class="question">
                <label for="todo-priority">Priority *</label>
                <select id="todo-priority" required>
                    <option value="low">Low</option>
                    <option value="med">Medium</option>
                    <option value="high">High</option>
                </select>
            </div>
            <button type="button" class="close" id="todo">✖</button>
            <button type="submit">Save</button>  
        </form>
    </div>
</body>
</html>
